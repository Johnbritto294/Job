<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs | Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div id="page-loader" class="page-loader">
    <div class="loader-logo-wrap">
      <img src="images/stacklylogo.webp" alt="Stackly" class="loader-logo-img" width="80" height="80">
    </div>
    <span class="loader-text">Loading</span>
  </div>

  <header id="header" class="header scrolled">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="images/stacklylogo.webp" alt="Stackly" class="logo-img" width="280" height="56" loading="eager">
      </a>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="jobs.html" class="nav-link active">Jobs</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <div class="nav-actions">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"><i class="ph ph-moon"></i></button>
        <a href="login.html" class="btn btn-outline" style="padding:0.6rem 1.5rem">Log In</a>
        <button id="mobile-menu-btn" class="mobile-menu-btn"><i class="ph ph-list"></i></button>
      </div>
    </div>
  </header>

  <div id="mobile-nav" class="mobile-nav">
    <button id="close-menu-btn" class="close-btn"><i class="ph ph-x"></i></button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="jobs.html">Jobs</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Log In</a></li>
    </ul>
  </div>

  <section class="page-hero-small">
    <div class="container reveal fade-up">
      <h1>Discover Your Next Role</h1>
      <p style="opacity:0.9;margin-top:0.5rem">10,000+ opportunities updated daily</p>
    </div>
  </section>

  <div class="container jobs-layout">
    <aside class="filters-sidebar glass reveal slide-left">
      <h3><i class="ph ph-funnel"></i> Filters</h3>
      <div class="filter-group">
        <label>Job Type</label>
        <div class="filter-options" data-filter="type">
          <label><input type="checkbox" value="full-time" checked> Full-time</label>
          <label><input type="checkbox" value="part-time"> Part-time</label>
          <label><input type="checkbox" value="contract"> Contract</label>
          <label><input type="checkbox" value="remote"> Remote</label>
        </div>
      </div>
      <div class="filter-group">
        <label>Salary Range</label>
        <div class="filter-options" data-filter="salary">
          <label><input type="checkbox" value="0-80"> Under $80k</label>
          <label><input type="checkbox" value="80-120" checked> $80k – $120k</label>
          <label><input type="checkbox" value="120-160"> $120k – $160k</label>
          <label><input type="checkbox" value="160+"> $160k+</label>
        </div>
      </div>
      <div class="filter-group">
        <label>Experience</label>
        <div class="filter-options" data-filter="experience">
          <label><input type="checkbox" value="entry"> Entry Level</label>
          <label><input type="checkbox" value="mid" checked> Mid Level</label>
          <label><input type="checkbox" value="senior"> Senior</label>
          <label><input type="checkbox" value="lead"> Lead / Director</label>
        </div>
      </div>
      <button type="button" class="btn btn-outline" id="clear-filters" style="width:100%">Clear Filters</button>
    </aside>

    <main>
      <div class="jobs-toolbar reveal fade-up">
        <p><strong id="job-count">12</strong> jobs found</p>
        <select id="sort-jobs" class="input-field" style="width:auto;padding:0.6rem 1rem">
          <option value="newest">Newest First</option>
          <option value="salary-high">Salary: High to Low</option>
          <option value="salary-low">Salary: Low to High</option>
        </select>
      </div>
      <div class="jobs-list" id="jobs-list"></div>
      <div class="load-more-wrap">
        <button type="button" class="btn btn-primary" id="load-more-btn">Load More Jobs</button>
      </div>
    </main>
  </div>

  <footer class="footer">
    <div class="container footer-bottom" style="border:none;padding-top:0">
      <span>&copy; 2026 Stackly</span>
      <a href="index.html">Back to Home</a>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/jobs.js"></script>
</body>
</html>
